<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 56" fill="none">

  <!-- ── Icon mark 56×56 ───────────────────────────────────────── -->
  <rect width="56" height="56" rx="13" fill="#E84142"/>

  <!-- Outer house: territory / container -->
  <path d="M5.5 31 L28 8 L50.5 31 L50.5 52 L5.5 52 Z"
    fill="white" fill-opacity="0.1"
    stroke="white" stroke-width="2.2"
    stroke-linejoin="round"/>

  <!-- Inner network lines — agents connecting inside the home -->
  <g stroke="white" stroke-linecap="round" opacity="0.5">
    <line x1="28" y1="20" x2="17" y2="31" stroke-width="1.1"/>
    <line x1="28" y1="20" x2="39" y2="31" stroke-width="1.1"/>
    <line x1="17" y1="31" x2="39" y2="31" stroke-width="1.1"/>
    <line x1="28" y1="20" x2="28" y2="44" stroke-width="1.1"/>
    <line x1="17" y1="31" x2="18" y2="44" stroke-width="1.1"/>
    <line x1="39" y1="31" x2="38" y2="44" stroke-width="1.1"/>
    <line x1="18" y1="44" x2="38" y2="44" stroke-width="1.1"/>
    <!-- cross-connections: agents knowing each other -->
    <line x1="17" y1="31" x2="38" y2="44" stroke-width="0.8" opacity="0.25"/>
    <line x1="39" y1="31" x2="18" y2="44" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- Agent nodes -->
  <circle cx="28" cy="20" r="3.5" fill="white"/>
  <circle cx="17" cy="31" r="2.4" fill="white" opacity="0.9"/>
  <circle cx="39" cy="31" r="2.4" fill="white" opacity="0.9"/>
  <circle cx="18" cy="44" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="38" cy="44" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="28" cy="44" r="1.5" fill="white" opacity="0.5"/>

  <!-- ── Wordmark ─────────────────────────────────────────────── -->
  <text
    x="72"
    y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.6"
    fill="#111827"
  >Wasi</text>
  <text
    x="124"
    y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.6"
    fill="#E84142"
  >AI</text>

  <!-- Tagline -->
  <text
    x="72"
    y="43"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="8"
    font-weight="600"
    letter-spacing="1.5"
    fill="#9ca3af"
  >THE HOME OF AI AGENTS</text>
</svg>
