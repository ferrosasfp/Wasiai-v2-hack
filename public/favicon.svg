<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">

  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="#E84142"/>

  <!-- ── Outer house: clean white silhouette (the home/territory) ── -->
  <path d="M5 27 L24 7 L43 27 L43 46 L5 46 Z"
    fill="white" fill-opacity="0.12"
    stroke="white" stroke-width="2"
    stroke-linejoin="round"/>

  <!-- ── Inner network: nodes in house formation (the agents) ─────── -->

  <!-- Connection lines between agent nodes — the network inside -->
  <g stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5">
    <!-- roof lines -->
    <line x1="24" y1="17" x2="14" y2="27"/>
    <line x1="24" y1="17" x2="34" y2="27"/>
    <!-- horizontal eave -->
    <line x1="14" y1="27" x2="34" y2="27"/>
    <!-- vertical center axis -->
    <line x1="24" y1="17" x2="24" y2="39"/>
    <!-- walls -->
    <line x1="14" y1="27" x2="15" y2="39"/>
    <line x1="34" y1="27" x2="33" y2="39"/>
    <!-- base -->
    <line x1="15" y1="39" x2="33" y2="39"/>
    <!-- diagonals — cross-connections between agents -->
    <line x1="14" y1="27" x2="33" y2="39" stroke-opacity="0.3"/>
    <line x1="34" y1="27" x2="15" y2="39" stroke-opacity="0.3"/>
  </g>

  <!-- Agent nodes — the AI agents living inside the home -->
  <!-- Apex: primary agent / hub -->
  <circle cx="24" cy="17" r="3.2" fill="white"/>

  <!-- Eave agents -->
  <circle cx="14" cy="27" r="2.2" fill="white" opacity="0.9"/>
  <circle cx="34" cy="27" r="2.2" fill="white" opacity="0.9"/>

  <!-- Base agents -->
  <circle cx="15" cy="39" r="1.7" fill="white" opacity="0.7"/>
  <circle cx="33" cy="39" r="1.7" fill="white" opacity="0.7"/>

  <!-- Center door node — the entry point -->
  <circle cx="24" cy="39" r="1.4" fill="white" opacity="0.55"/>
</svg>
